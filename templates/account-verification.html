<!DOCTYPE html>
<html lang="en" style="margin:0; padding:0;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Verification</title>
  <style>
    body {
      background-color: #f4f4f7;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #333;
    }
    .email-wrapper {
      max-width: 600px;
      margin: auto;
      background-color: #ffffff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo img {
      max-height: 60px;
    }
    .heading {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1a1a1a;
      text-align: center;
    }
    .message {
      font-size: 16px;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.6;
    }
    .otp-code {
      display: inline-block;
      background-color: #e6f0ff;
      color: #004085;
      font-size: 28px;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 6px;
      letter-spacing: 4px;
      margin: 20px auto;
    }
    .footer {
      text-align: center;
      font-size: 13px;
      color: #888888;
      margin-top: 40px;
    }
    .footer a {
      color: #888;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="heading">Activate Your Account</div>
    <div class="message">
      Hello {{ name }},<br><br>
      To complete your account setup, please enter the OTP code below. This code is valid for <strong>{{duration}} minutes</strong>.
    </div>
    <div style="text-align:center;">
      <div class="otp-code">{{ code }}</div>
    </div>
    <div class="message">
      If you didn’t request this code, please ignore this email.<br>
    </div>
  </div>
</body>
</html>
